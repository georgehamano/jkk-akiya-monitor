name: JKK 空き家監視

on:
  schedule:
    # 10分おきに実行（UTC基準 / 日本時間 = UTC+9）
    # GitHub Actions のスケジューラは高負荷時に数分遅延する場合があります
    - cron: "*/10 * * * *"
    # 毎朝8時（JST）に日次レポートを送信（UTC 23:00 = JST 08:00）
    - cron: "0 23 * * *"
  # 手動実行も可能にしておく
  workflow_dispatch:
    inputs:
      test:
        description: "テスト送信（LINEにサンプル通知を送る）"
        type: boolean
        default: false
      daily:
        description: "日次レポート送信（在庫状況まとめ）"
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 状態ファイルを git push するために必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          # push 用に PAT または GITHUB_TOKEN を使用
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.12 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 依存パッケージをインストール
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # Playwright（将来の JavaScript レンダリング対応用）
          pip install playwright
          playwright install chromium --with-deps

      - name: JKK 監視スクリプトを実行
        env:
          # LINE Messaging API
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          # 状態ファイル保存先（リポジトリルート）
          JKK_DATA_DIR: ${{ github.workspace }}
          # 必要に応じて詳細 URL を上書き
          JKK_DETAIL_VIEW_BASE: ${{ secrets.JKK_DETAIL_VIEW_BASE }}
        run: |
          if [ "${{ github.event.inputs.test }}" = "true" ]; then
            python jkk_line_notify.py --test
          elif [ "${{ github.event.inputs.daily }}" = "true" ] || [ "${{ github.event.schedule }}" = "0 23 * * *" ]; then
            python jkk_line_notify.py --daily
          else
            python jkk_line_notify.py
          fi

      - name: 状態ファイルが更新されていれば自動コミット & プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # last_data.json / last_rooms.json に変更があるか確認
          git add last_data.json last_rooms.json last_rooms_detail.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "状態ファイルに変更なし。コミットをスキップします。"
          else
            git commit -m "chore: 状態ファイルを更新 [skip ci]"
            git push
          fi

      - name: vacancies.json を公開リポジトリへ書き出し
        env:
          JKK_DATA_PAT: ${{ secrets.JKK_DATA_PAT }}
        run: |
          # last_data.json と last_rooms_detail.json を vacancies.json に変換して push
          python - <<'PYEOF'
          import json, datetime, os, subprocess, pathlib

          data_file = pathlib.Path("last_data.json")
          detail_file = pathlib.Path("last_rooms_detail.json")

          if not data_file.exists():
              print("last_data.json が見つかりません。スキップします。")
              exit(0)

          data = json.loads(data_file.read_text(encoding="utf-8"))
          detail = json.loads(detail_file.read_text(encoding="utf-8")) if detail_file.exists() else {}

          properties = [
              {"name": name, "total": total, "rooms": detail.get(name, {})}
              for name, total in data.items()
          ]

          jst = datetime.timezone(datetime.timedelta(hours=9))
          vacancies = {
              "updated_at": datetime.datetime.now(jst).isoformat(timespec="seconds"),
              "properties": properties,
          }

          pathlib.Path("vacancies.json").write_text(
              json.dumps(vacancies, ensure_ascii=False, indent=2), encoding="utf-8"
          )
          print("vacancies.json を生成しました。")
          PYEOF

          # PAT が未設定なら skip
          if [ -z "$JKK_DATA_PAT" ]; then
            echo "JKK_DATA_PAT が未設定のため公開リポジトリへの書き出しをスキップします。"
            exit 0
          fi

          # jkk-akiya-data リポジトリへ push
          REPO="https://github-actions[bot]:${JKK_DATA_PAT}@github.com/georgehamano/jkk-akiya-data.git"
          WORKDIR=$(mktemp -d)
          git clone --depth 1 "$REPO" "$WORKDIR"
          cp vacancies.json "$WORKDIR/vacancies.json"
          cd "$WORKDIR"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vacancies.json
          if git diff --cached --quiet; then
            echo "vacancies.json に変更なし。スキップします。"
          else
            git commit -m "chore: vacancies.json を更新"
            git push
            echo "vacancies.json を公開リポジトリへ push しました。"
          fi
